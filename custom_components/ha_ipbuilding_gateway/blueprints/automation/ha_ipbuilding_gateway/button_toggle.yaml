# ipbuilding_blueprint_version: 4
blueprint:
  name: IPBuilding wandknop — toggle
  description: >
    Minimal single-button control for an IPBuilding IP1100PoE wall switch.
    Each short press toggles a light or switch.

    For more advanced patterns (separate actions on short vs long press,
    dim-during-hold, curtains, scenes) use the companion blueprints:
      - `button_standard` — short/long press with on/off/toggle/scene
      - `button_dim` — toggle + dim while held
      - `button_cover` — hold-to-move / release-to-stop for curtains

    The automation name is set in the Home Assistant popup that appears
    after you press "Opslaan" — the blueprint itself does not declare
    an alias. The popup prefills the blueprint-name; change it to the
    friendly name you want (e.g. "Keuken wandknop → Keuken LED") before
    confirming. After saving, the automation appears in the list under
    that name.
  domain: automation
  source_url: https://github.com/markminnoye/ha-ipbuilding-gateway/blob/main/custom_components/ha_ipbuilding_gateway/blueprints/automation/ha_ipbuilding_gateway/button_toggle.yaml

  input:
    button_entity:
      name: Knop
      description: >
        De IPBuilding event-entity van de fysieke wandknop
        (bv. `event.2f8185190000df`). De entity moet ingeschakeld zijn
        in Instellingen → Apparaten & entiteiten.
      selector:
        entity:
          filter:
            - domain: event
              integration: ha_ipbuilding_gateway

    target_entity:
      name: Lamp of schakelaar
      description: >
        De lamp of schakelaar die getoggled wordt. Voor "alle lampen in
        een ruimte" of een scene: gebruik `button_standard`.
      default: ""
      selector:
        entity:
          domain:
            - light
            - switch
          multiple: false

mode: single

trigger:
  - platform: state
    entity_id: !input button_entity
    to: "press"
    id: press

action:
  - action: homeassistant.toggle
    target:
      entity_id: !input target_entity
