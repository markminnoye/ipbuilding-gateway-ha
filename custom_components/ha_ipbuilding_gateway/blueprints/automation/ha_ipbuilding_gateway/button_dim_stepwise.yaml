# ipbuilding_blueprint_version: 1
blueprint:
  name: IPBuilding wandknop — dimmen (HA-stapsgewijs, alternatief)
  description: >
    **Blueprint-versie: 1.** **Alternatief voor `button_dim`.** HA-gestuurd, stapsgewijs dimmen voor
    een IPBuilding IP1100PoE wandknop. Gebruik dit alleen als je de
    **native** `button_dim` (gateway + IP0300PoE regelen de ramp zelf) niet
    wilt — bv. als je de dimsnelheid/-stap in HA wilt regelen of een
    dimmer zonder native hold-to-dim aanstuurt.

    Verschil met `button_dim` (native):
      - native: één `dim_start`/`dim_stop` per hold; de module rampt en
        keert zelf om. Geen helper.
      - dit (stapsgewijs): HA stuurt herhaald `light.turn_on` met een
        stap-% en houdt de richting bij in een `input_boolean` helper.
        Meer busverkeer en een extra helper nodig.

    Gedrag:
      - Korte druk → toggle (geen richtingswissel).
      - Vasthouden (long_press) → dim-loop. De eerste hold zet de lamp op
        1 % als die uit stond, daarna doordimmen.
      - Loslaten na een lange druk → richting-helper omdraaien.
      - Loslaten na een korte druk → geen wissel.

    Voor gewone aan/uit/scene: `button_standard`.
  domain: automation
  source_url: https://github.com/markminnoye/ha-ipbuilding-gateway/blob/main/custom_components/ha_ipbuilding_gateway/blueprints/automation/ha_ipbuilding_gateway/button_dim_stepwise.yaml

  input:
    button_entity:
      name: Knop
      description: >
        De IPBuilding event-entity van de fysieke wandknop
        (bv. `event.2f8185190000df`). De entity moet ingeschakeld zijn
        in Instellingen → Apparaten & entiteiten.
      selector:
        entity:
          filter:
            - domain: event
              integration: ha_ipbuilding_gateway

    target_light:
      name: Lamp
      description: De lamp (of lampengroep) om te dimmen.
      selector:
        entity:
          domain: light
          multiple: false

    direction_helper:
      name: Dim-richting helper
      description: >
        `input_boolean` helper die de huidige dim-richting bijhoudt.
        AAN = volgende hold dimt omhoog, UIT = omlaag. De blueprint
        flipt deze na elke release van een lange druk en bij het
        bereiken van 1 % / 100 %.

        Aanmaken: Instellingen → Apparaten & services → Helpers → Toggle.
        Vul bij **Naam** een leesbaar label in (mag spaties bevatten),
        bv. "Keuken knop 1 — dim omhoog". Stel de **Entity ID** apart in
        op alleen kleine letters, cijfers en underscores, bv.
        `ipb_keuken_knop_1_dim_up`. Spaties in de entity_id veroorzaken
        een fout bij het opslaan.
      selector:
        entity:
          domain: input_boolean

    dim_step_pct:
      name: Dim-stap %
      description: Helderheidsverandering per loop-iteratie.
      default: 5
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
          mode: slider

    dim_interval_ms:
      name: Dim-interval (ms)
      description: Pauze tussen dim-stappen. Kleiner = sneller dimmen, meer verkeer.
      default: 200
      selector:
        number:
          min: 50
          max: 2000
          unit_of_measurement: "ms"
          mode: slider

    dim_boundary_pct:
      name: Dim-grens %
      description: >
        Initiële richting als de helper-state nog niet beschikbaar is
        (< dit % → omhoog, ≥ dit % → omlaag). Ook gebruikt als zachte
        hint bij opstart.
      default: 50
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
          mode: slider

mode: restart

trigger:
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "single_press"
    not_from:
      - unavailable
      - unknown
    id: single_press
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "long_press"
    not_from:
      - unavailable
      - unknown
    id: hold
  - platform: state
    entity_id: !input button_entity
    # Only a release that ends a hold (long_press → release). A short-tap
    # release (single_press → release) must NOT fire here: with mode:restart
    # it would cancel the in-flight single_press toggle before it runs.
    attribute: event_type
    from: "long_press"
    to: "release"
    id: release
  # Auto-flip on hitting either brightness endpoint.
  - platform: numeric_state
    entity_id: !input target_light
    attribute: brightness
    above: 254
    id: hit_top
    for:
      seconds: 1
  - platform: numeric_state
    entity_id: !input target_light
    attribute: brightness
    below: 3
    id: hit_bottom
    for:
      seconds: 1

action:
  - choose:
    # Short press → toggle the light. The gateway emits `single_press`
    # on release of a short tap, so this fires immediately when the
    # operator releases — no 600 ms timing disambiguation needed: the
    # gateway classifies the press, the blueprint just maps events to
    # actions. A long press fires `long_press` instead of `single_press`,
    # so the two are mutually exclusive.
      - conditions:
          - condition: trigger
            id: single_press
        sequence:
          - action: light.toggle
            target:
              entity_id: !input target_light

      # Hold → repeat the dim loop while the trigger id is "hold".
      - conditions:
          - condition: trigger
            id: hold
        sequence:
          - variables:
              step: !input dim_step_pct
              interval_ms: !input dim_interval_ms
              direction_helper: !input direction_helper
              sign: "{{ 1 if is_state(direction_helper, 'on') else -1 }}"
          # If the light is off, turn it on at 1 % before dimming so the
          # first hold doesn't start from a black lamp.
          - if:
              - condition: state
                entity_id: !input target_light
                state: "off"
            then:
              - action: light.turn_on
                target:
                  entity_id: !input target_light
                data:
                  brightness_pct: 1
                  transition: 0.2
          - repeat:
              while:
                - condition: trigger
                  id: hold
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: !input target_light
                  data:
                    brightness_step_pct: "{{ step * sign }}"
                    transition: 0.2
                - delay:
                    milliseconds: !input dim_interval_ms

      # Release → flip the direction helper only when the previous state
      # was long_press (i.e. an actual long press happened).
      - conditions:
          - condition: trigger
            id: release
          - condition: template
            value_template: "{{ trigger.from_state is not none and trigger.from_state.attributes.event_type == 'long_press' }}"
        sequence:
          - action: input_boolean.toggle
            target:
              entity_id: !input direction_helper

      # Endpoint hit → flip the direction helper.
      - conditions:
          - condition: trigger
            id:
              - hit_top
              - hit_bottom
        sequence:
          - action: input_boolean.toggle
            target:
              entity_id: !input direction_helper
