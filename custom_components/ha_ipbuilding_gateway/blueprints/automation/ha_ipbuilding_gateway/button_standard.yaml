# ipbuilding_blueprint_version: 7
blueprint:
  name: IPBuilding wandknop — kort en lang
  description: >
    **Blueprint-versie: 7.** Two-phase control for an IPBuilding
    IP1100PoE wall switch. Use this when a short press and a long
    press should drive different things.

    Each phase takes a full action sequence — the same editor you see
    when building an automation in Home Assistant. Pick the service,
    the target, and any extra data yourself: brightness, transition,
    multiple lights, scenes, helpers, scripts, notifications — anything
    HA can do, the blueprint can do on press and on long press.

    Long press is optional; leave the "Lang indrukken" actions empty to
    only react to short presses.

    Press-vs-long-press is decided in the gateway: a short tap emits
    `single_press` on release, a hold emits `long_press` at the
    threshold. The two are mutually exclusive, so this blueprint just
    maps each to a full action sequence — no timing logic.

    For dimming while held use `button_dim`. For curtains
    (hold-to-move / release-to-stop) use `button_cover`.
  domain: automation
  source_url: https://github.com/markminnoye/ha-ipbuilding-gateway/blob/main/custom_components/ha_ipbuilding_gateway/blueprints/automation/ha_ipbuilding_gateway/button_standard.yaml

  input:
    common_section:
      name: Algemeen
      icon: mdi:cog-outline
      input:
        button_entity:
          name: Knop
          description: >
            De IPBuilding event-entity van de fysieke wandknop
            (bv. `event.2f8185190000df`). De entity moet ingeschakeld
            zijn in Instellingen → Apparaten & entiteiten.
          selector:
            entity:
              filter:
                - domain: event
                  integration: ha_ipbuilding_gateway

    press_section:
      name: Korte druk
      icon: mdi:gesture-tap-button
      input:
        press_action:
          name: Actie bij korte druk
          description: >
            Wat de automatisering doet op een korte druk. Dit is een
            volledige action-editor — voeg één of meerdere service-calls
            toe (lampen, scenes, helpers, scripts, notificaties, …).
          default: []
          selector:
            action:

    long_press_section:
      name: Lang indrukken (optioneel)
      icon: mdi:gesture-two-tap-button
      collapsed: true
      input:
        long_press_action:
          name: Actie bij lange druk
          description: >
            Wat de automatisering doet zodra de knop langer dan de
            hold-drempel (~1,5 s) wordt vastgehouden. Laat leeg om
            alleen op korte drukken te reageren.
          default: []
          selector:
            action:

mode: single

trigger:
  # The gateway now classifies the press: single_press fires on the
  # release of a short tap, long_press fires at the hold threshold
  # while the button is still held. They are mutually exclusive, so no
  # wait/timeout is needed.
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "single_press"
    not_from:
      - unavailable
      - unknown
    id: short
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "long_press"
    not_from:
      - unavailable
      - unknown
    id: long

action:
  - choose:
      - conditions:
          - condition: trigger
            id: long
        sequence: !input long_press_action
    default: !input press_action
