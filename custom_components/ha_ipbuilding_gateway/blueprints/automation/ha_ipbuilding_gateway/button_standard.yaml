# ipbuilding_blueprint_version: 8
blueprint:
  name: IPBuilding wandknop — kort en lang
  description: >
    **Blueprint-versie: 8.** Wandknop met korte én lange druk — elk
    een eigen actie-reeks. Lang indrukken is optioneel.
    Voor continu dimmen: `button_dim`.
  domain: automation
  source_url: https://github.com/markminnoye/ha-ipbuilding-gateway/blob/main/custom_components/ha_ipbuilding_gateway/blueprints/automation/ha_ipbuilding_gateway/button_standard.yaml

  input:
    common_section:
      name: Algemeen
      icon: mdi:cog-outline
      input:
        button_entity:
          name: Knop
          description: IPBuilding event-entity van de wandknop.
          selector:
            entity:
              filter:
                - domain: event
                  integration: ha_ipbuilding_gateway

    press_section:
      name: Korte druk
      icon: mdi:gesture-tap-button
      input:
        press_action:
          name: Actie bij korte druk
          description: Eén of meer acties op korte druk.
          default: []
          selector:
            action:

    long_press_section:
      name: Lang indrukken (optioneel)
      icon: mdi:gesture-two-tap-button
      input:
        long_press_action:
          name: Actie bij lange druk
          description: Eén of meer acties op lange druk. Laat leeg voor alleen korte druk.
          default: []
          selector:
            action:

mode: single

trigger:
  # The gateway now classifies the press: single_press fires on the
  # release of a short tap, long_press fires at the hold threshold
  # while the button is still held. They are mutually exclusive, so no
  # wait/timeout is needed.
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "single_press"
    not_from:
      - unavailable
      - unknown
    id: short
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "long_press"
    not_from:
      - unavailable
      - unknown
    id: long

action:
  - choose:
      - conditions:
          - condition: trigger
            id: long
        sequence: !input long_press_action
    default: !input press_action
