# ipbuilding_blueprint_version: 7
blueprint:
  name: "[Voorbeeld] IPBuilding wandknop — gordijn"
  description: >
    **Blueprint-versie: 7.** **Dit is een voorbeeld-blueprint** — niet productie-klaar. De
    Companion-ontwikkelaars hebben geen `cover` hardware om dit te
    testen; de blueprint is naar beste weten opgebouwd uit de
    IPBuilding-specificatie en de Home Assistant `cover`-services,
    maar nog niet gevalideerd op een fysiek gordijn.

    Hold-to-move / release-to-stop pattern voor een Home Assistant
    `cover` entity (gordijn, screen, rolluik, markies) aangestuurd
    door een IPBuilding IP1100PoE wandknop.

    Standaardpatroon:
      - hold = open (of close) het gordijn;
      - release = stop;
      - korte druk = niets (of toggle / open / close als een korte tik
        het gordijn moet positioneren).

    `release` vuurt bij elke loslating, ook na een korte druk.
    Kies "Geen" bij korte druk als een tik alleen als "stoppen" moet
    gelden — het gordijn blijft dan waar het is.

    Voor simpele aan/uit/toggle: gebruik `button_standard`.
    Voor gedimde verlichting: gebruik `button_dim`.

    Bugs / verbeteringen graag melden via
    https://github.com/markminnoye/ha-ipbuilding-gateway/issues met
    label `cover-blueprint`.
  domain: automation
  source_url: https://github.com/markminnoye/ha-ipbuilding-gateway/blob/main/custom_components/ha_ipbuilding_gateway/blueprints/automation/ha_ipbuilding_gateway/button_cover.yaml

  input:
    common_section:
      name: Algemeen
      icon: mdi:cog-outline
      input:
        button_entity:
          name: Knop
          description: >
            De IPBuilding event-entity van de fysieke wandknop
            (bv. `event.2f8185190000df`).
          selector:
            entity:
              filter:
                - domain: event
                  integration: ha_ipbuilding_gateway

        cover_entity:
          name: Gordijn
          description: >
            De `cover` entity die wordt aangestuurd. Verplicht.
          selector:
            entity:
              filter:
                - domain: cover

    hold_section:
      name: Vasthouden
      icon: mdi:gesture-two-tap-button
      input:
        hold_direction:
          name: Richting tijdens vasthouden
          description: >
            Welke kant het gordijn op beweegt zolang de knop wordt
            vastgehouden.
          default: open
          selector:
            select:
              options:
                - label: Openen
                  value: "open"
                - label: Sluiten
                  value: "close"

    release_section:
      name: Loslaten
      icon: mdi:stop
      input:
        release_action:
          name: Actie bij loslaten
          description: >
            Vuurt op elke loslating, ook na een korte tik. Standaard
            stopt het gordijn zodra de knop wordt losgelaten.
          default: stop
          selector:
            select:
              options:
                - label: Stoppen
                  value: "stop"
                - label: Geen
                  value: "none"

    press_section:
      name: Korte druk (optioneel)
      icon: mdi:gesture-tap-button
      collapsed: true
      input:
        press_action:
          name: Actie op korte druk
          description: >
            Optionele actie bij een korte tik. Laat op "Geen" staan als
            een korte tik niets hoeft te doen (het gordijn stopt dan
            sowieso bij release, maar beweegt niet).
          default: none
          selector:
            select:
              options:
                - label: Geen
                  value: "none"
                - label: Openen
                  value: "open"
                - label: Sluiten
                  value: "close"
                - label: Toggle
                  value: "toggle"

mode: single

variables:
  hold_direction: !input hold_direction
  release_action: !input release_action
  press_action: !input press_action

trigger:
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "single_press"
    not_from:
      - unavailable
      - unknown
    id: single_press
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "long_press"
    not_from:
      - unavailable
      - unknown
    id: long_press
  - platform: state
    entity_id: !input button_entity
    # Only a release that ends a hold (long_press → release). A short-tap
    # release (single_press → release) must NOT fire the stop branch and
    # undo a configured short-press action.
    attribute: event_type
    from: "long_press"
    to: "release"
    id: release

action:
  - choose:
      # Short press — optional.
      - conditions:
          - condition: trigger
            id: single_press
          - condition: template
            value_template: "{{ press_action != 'none' }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ press_action == 'open' }}"
                sequence:
                  - action: cover.open_cover
                    target:
                      entity_id: !input cover_entity
              - conditions:
                  - condition: template
                    value_template: "{{ press_action == 'close' }}"
                sequence:
                  - action: cover.close_cover
                    target:
                      entity_id: !input cover_entity
              - conditions:
                  - condition: template
                    value_template: "{{ press_action == 'toggle' }}"
                sequence:
                  - action: cover.toggle
                    target:
                      entity_id: !input cover_entity

      # Hold — move the cover in the configured direction.
      - conditions:
          - condition: trigger
            id: long_press
          - condition: template
            value_template: "{{ hold_direction == 'open' }}"
        sequence:
          - action: cover.open_cover
            target:
              entity_id: !input cover_entity

      - conditions:
          - condition: trigger
            id: long_press
          - condition: template
            value_template: "{{ hold_direction == 'close' }}"
        sequence:
          - action: cover.close_cover
            target:
              entity_id: !input cover_entity

      # Release — stop by default.
      - conditions:
          - condition: trigger
            id: release
          - condition: template
            value_template: "{{ release_action == 'stop' }}"
        sequence:
          - action: cover.stop_cover
            target:
              entity_id: !input cover_entity
