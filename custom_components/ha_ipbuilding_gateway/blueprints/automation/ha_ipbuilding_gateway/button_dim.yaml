# ipbuilding_blueprint_version: 8
blueprint:
  name: IPBuilding wandknop — dimmen
  description: >
    **Blueprint-versie: 8.** Kort indrukken = toggle · vasthouden =
    native hold-to-dim ramp (gateway + IP0300PoE regelen de richting
    zelf) · loslaten = ramp stoppen. Geen helper nodig.
    Wil je in plaats daarvan HA-gestuurd, stapsgewijs dimmen (met een
    richting-helper)? Gebruik `button_dim_stepwise` (alternatief).
    Voor gewone aan/uit/scene: `button_standard`.
  domain: automation
  source_url: https://github.com/markminnoye/ha-ipbuilding-gateway/blob/main/custom_components/ha_ipbuilding_gateway/blueprints/automation/ha_ipbuilding_gateway/button_dim.yaml

  input:
    button_entity:
      name: Knop
      description: IPBuilding event-entity van de wandknop.
      selector:
        entity:
          filter:
            - domain: event
              integration: ha_ipbuilding_gateway

    target_light:
      name: Lamp
      description: De lamp (of lampengroep) om te dimmen.
      selector:
        entity:
          domain: light
          multiple: false

mode: restart

trigger:
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "single_press"
    not_from:
      - unavailable
      - unknown
    id: single_press
  - platform: state
    entity_id: !input button_entity
    attribute: event_type
    to: "long_press"
    not_from:
      - unavailable
      - unknown
    id: hold
  - platform: state
    entity_id: !input button_entity
    # Only a release that ends a hold (long_press → release) fires here.
    # A short-tap release (single_press → release) must NOT fire the stop
    # path — with mode:restart it would cancel the in-flight single_press
    # toggle before it runs.
    attribute: event_type
    from: "long_press"
    to: "release"
    id: release

action:
  - choose:
      # Short press → toggle the light. The gateway emits `single_press`
      # on release of a short tap, so this fires immediately when the
      # operator releases. v8 keeps the v6/v7 contract: the gateway
      # classifies the press, the blueprint just maps events to actions.
      - conditions:
          - condition: trigger
            id: single_press
        sequence:
          - action: light.toggle
            target:
              entity_id: !input target_light

      # Hold → start the native ramp on the IP0300PoE. The module ramps
      # and auto-reverses direction on each successive hold; no helper,
      # no repeat, no endpoint detection in HA. The dim_speed is the
      # module's internal setting (matches native IPBox behaviour).
      - conditions:
          - condition: trigger
            id: hold
        sequence:
          - action: ha_ipbuilding_gateway.dim_start
            target:
              entity_id: !input target_light

      # Release (after a real long press) → stop the ramp. The dimmer
      # replies with the level reached when the stop landed and the
      # companion light follows via the existing state_changed wire.
      - conditions:
          - condition: trigger
            id: release
        sequence:
          - action: ha_ipbuilding_gateway.dim_stop
            target:
              entity_id: !input target_light
