# ipbuilding_blueprint_version: 3
blueprint:
  name: IPBuilding wandknop — toggle
  description: >
    Minimal single-button control for an IPBuilding IP1100PoE wall switch.
    Each short press toggles a light or switch.

    For more advanced patterns (separate actions on short vs long press,
    dim-during-hold, curtains, scenes) use the companion blueprints:
      - `button_standard` — short/long press with on/off/toggle/scene
      - `button_dim` — toggle + dim while held
      - `button_cover` — hold-to-move / release-to-stop for curtains
  domain: automation
  source_url: https://github.com/markminnoye/ipbuilding-gateway-ha/blob/main/custom_components/ipbuilding_gateway_ha/blueprints/automation/ipbuilding_gateway_ha/button_toggle.yaml

  input:
    automation_name:
      name: Naam automatisering
      description: >
        Gebruik de weergavenaam van de knop (zichtbaar in de entity-kiezer),
        bv. "Keuken wandknop → Keuken LED". De entity_id `event.<hardware_id>`
        is bewust niet leesbaar en hoort niet in de alias.
      default: ""
      selector:
        text:

    button_entity:
      name: Knop
      description: >
        De IPBuilding event-entity van de fysieke wandknop
        (bv. `event.2f8185190000df`). De entity moet ingeschakeld zijn
        in Instellingen → Apparaten & entiteiten.
      selector:
        entity:
          filter:
            - domain: event
              integration: ipbuilding_gateway_ha

    target_entity:
      name: Lamp of schakelaar
      description: >
        De lamp of schakelaar die getoggled wordt. Voor "alle lampen in
        een ruimte" of een scene: gebruik `button_standard`.
      default: ""
      selector:
        entity:
          domain:
            - light
            - switch
          multiple: false

alias: !input automation_name
mode: single

trigger:
  - platform: state
    entity_id: !input button_entity
    to: "press"
    id: press

action:
  - action: homeassistant.toggle
    target:
      entity_id: !input target_entity
