# ipbuilding_blueprint_version: 1
# NOTE: This file is a back-compat stub kept for existing automations.
# The blueprint logic now lives in `button_dim.yaml` and ships with the
# companion as of v0.5.0. New automations should use `button_dim.yaml`
# directly. Existing automations that reference `dim_button.yaml` keep
# working; the companion overlays no longer need the dim helper name
# in the path.
#
# Save changes to a new automation based on `button_dim.yaml` and
# delete this stub file from your config/blueprints folder when no
# references remain.
blueprint:
  name: "[VEROUDERD] IPBuilding button — toggle + dim during hold"
  description: >
    DEPRECATED — use `button_dim.yaml` from the same companion instead.
    This stub is kept so existing automations that reference this path
    continue to load. The companion now ships a renamed and improved
    blueprint under `ipbuilding_gateway_ha/button_dim.yaml` with:
      - fixed `max: 1` validation error;
      - Dutch label and helper UX (entity_id vs. name);
      - explicit automation name and area fields.

    Steps to migrate:
      1. Create a new automation from the `button_dim` blueprint.
      2. Re-enter the same button, light, and direction helper.
      3. Enable the new automation and disable this one.
      4. Delete `ipbuilding_gateway_ha/dim_button.yaml` from your
         `config/blueprints/automation/` folder.
  domain: automation
  source_url: https://github.com/markminnoye/ipbuilding-gateway-ha/blob/main/custom_components/ipbuilding_gateway_ha/blueprints/automation/ipbuilding_gateway_ha/button_dim.yaml

  input:
    button_entity:
      name: Knop
      description: >
        Alleen-lezen stub. Migreer naar `button_dim.yaml`.
      selector:
        entity:
          filter:
            - domain: event
              integration: ipbuilding_gateway_ha

    target_light:
      name: Lamp
      description: Alleen-lezen stub.
      selector:
        entity:
          domain: light
          multiple: false

    direction_helper:
      name: Dim-richting helper
      description: Alleen-lezen stub.
      selector:
        entity:
          domain: input_boolean

    dim_step_pct:
      name: Dim-stap %
      default: 5
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
          mode: slider

    dim_interval_ms:
      name: Dim-interval (ms)
      default: 200
      selector:
        number:
          min: 50
          max: 2000
          unit_of_measurement: "ms"
          mode: slider

    dim_boundary_pct:
      name: Dim-grens %
      default: 50
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
          mode: slider

mode: single
alias: "[VEROUDERD] migreer naar button_dim.yaml"

trigger:
  - platform: state
    entity_id: !input button_entity
    to: "press"
    id: press

action:
  - action: persistent_notification.create
    data:
      title: "IPBuilding blueprint verouderd"
      message: >
        Deze automatisering is gebaseerd op `dim_button.yaml`, dat vanaf
        companion v0.5.0 vervangen is door `button_dim.yaml`. Maak een
        nieuwe automatisering vanuit dat blueprint, zet deze uit en
        verwijder daarna het stub-bestand uit
        `config/blueprints/automation/ipbuilding_gateway_ha/`.
      notification_id: "ipbuilding_dim_button_deprecated"
