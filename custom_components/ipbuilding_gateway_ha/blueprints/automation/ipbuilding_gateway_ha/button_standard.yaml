# ipbuilding_blueprint_version: 2
blueprint:
  name: IPBuilding wandknop — kort en lang
  description: >
    Two-phase control for an IPBuilding IP1100PoE wall switch. Use this
    when a short press and a long press should drive different things.

    Each phase has two inputs:
      - action: what to do (`Geen`, `Aan`, `Uit`, `Toggle`, `Scene activeren`)
      - target: één entity, meerdere entities, of alle lampen/schakelaars
        in een ruimte. Scenes worden ook ondersteund.

    Use a separate `button_cover` blueprint for curtains (hold-to-move +
    release-to-stop). Use `button_dim` for dimming while held. Use
    `button_toggle` when only the short press is needed.
  domain: automation
  source_url: https://github.com/markminnoye/ipbuilding-gateway-ha/blob/main/custom_components/ipbuilding_gateway_ha/blueprints/automation/ipbuilding_gateway_ha/button_standard.yaml

  input:
    common_section:
      name: Algemeen
      icon: mdi:cog-outline
      input:
        automation_name:
          name: Naam automatisering
          description: >
            Gebruik de weergavenaam van de knop, bv.
            "Keuken wandknop → Keuken LED". De entity_id
            `event.<hardware_id>` is bewust niet leesbaar.
          default: ""
          selector:
            text:

        button_entity:
          name: Knop
          description: >
            De IPBuilding event-entity van de fysieke wandknop
            (bv. `event.2f8185190000df`). De entity moet ingeschakeld
            zijn in Instellingen → Apparaten & entiteiten.
          selector:
            entity:
              filter:
                - domain: event
                  integration: ipbuilding_gateway_ha

        automation_area:
          name: Ruimte
          description: >
            Ruimte voor de automatisering. De companion zet de `room` uit
            devices.json als `suggested_area` op het knop-device; kies
            hier dezelfde ruimte zodat de automatisering in de Lovelace-ruimte
            verschijnt.
          default: ""
          selector:
            area:

    press_section:
      name: Korte druk
      icon: mdi:gesture-tap-button
      input:
        press_action:
          name: Actie
          description: Wat de automatisering op een korte druk doet.
          default: toggle
          selector:
            select:
              options:
                - label: Geen (alleen reageren op lang indrukken)
                  value: "none"
                - label: Aan
                  value: "on"
                - label: Uit
                  value: "off"
                - label: Toggle
                  value: "toggle"
                - label: Scene activeren
                  value: "activate_scene"

        press_target:
          name: Doel
          description: >
            Lamp, schakelaar, scene of ruimte. Voor meerdere tegelijk:
            voeg ze toe via het plus-icoon. Bij "Scene activeren" moet
            minstens één scene in dit doel zitten.
          default: {}
          selector:
            target:
              entity:
                domain:
                  - light
                  - switch
                  - scene

    long_press_section:
      name: Lang indrukken (optioneel)
      icon: mdi:gesture-two-tap-button
      collapsed: true
      input:
        long_press_action:
          name: Actie
          description: >
            Wat de automatisering doet zodra de knop langer dan de hold-drempel
            (gateway-side, standaard 1,5 s) wordt vastgehouden.
          default: none
          selector:
            select:
              options:
                - label: Geen
                  value: "none"
                - label: Aan
                  value: "on"
                - label: Uit
                  value: "off"
                - label: Toggle
                  value: "toggle"
                - label: Scene activeren
                  value: "activate_scene"

        long_press_target:
          name: Doel
          description: >
            Lamp, schakelaar, scene of ruimte. Voor meerdere tegelijk:
            voeg ze toe via het plus-icoon.
          default: {}
          selector:
            target:
              entity:
                domain:
                  - light
                  - switch
                  - scene

alias: !input automation_name
area_id: !input automation_area
mode: single

variables:
  press_action: !input press_action
  press_target: !input press_target
  long_press_action: !input long_press_action
  long_press_target: !input long_press_target
  # Scene-guard: een `target:` bevat altijd een `entity_id` lijst; scene-entities
  # hebben als prefix `scene.`. We checken of er minstens één scene in zit.
  press_has_scene: "{{ 'scene.' in (press_target.entity_id | default([]) | join(',')) }}"
  long_press_has_scene: "{{ 'scene.' in (long_press_target.entity_id | default([]) | join(',')) }}"

trigger:
  - platform: state
    entity_id: !input button_entity
    to: "press"
    id: press
  - platform: state
    entity_id: !input button_entity
    to: "long_press"
    id: long_press

action:
  - choose:
      # Press + scene-activatie: alleen als er een scene in het target zit.
      - conditions:
          - condition: trigger
            id: press
          - condition: template
            value_template: "{{ press_action == 'activate_scene' and press_has_scene }}"
        sequence:
          - action: scene.turn_on
            target: !input press_target

      # Press + on/off/toggle: alleen als er GEEN scene in het target zit
      # (een scene-entity heeft geen on/off/toggle; actie wordt defensief
      # overgeslagen in plaats van een fout te geven).
      - conditions:
          - condition: trigger
            id: press
          - condition: template
            value_template: "{{ press_action == 'on' and not press_has_scene }}"
        sequence:
          - action: homeassistant.turn_on
            target: !input press_target

      - conditions:
          - condition: trigger
            id: press
          - condition: template
            value_template: "{{ press_action == 'off' and not press_has_scene }}"
        sequence:
          - action: homeassistant.turn_off
            target: !input press_target

      - conditions:
          - condition: trigger
            id: press
          - condition: template
            value_template: "{{ press_action == 'toggle' and not press_has_scene }}"
        sequence:
          - action: homeassistant.toggle
            target: !input press_target

      # Long press + scene-activatie.
      - conditions:
          - condition: trigger
            id: long_press
          - condition: template
            value_template: "{{ long_press_action == 'activate_scene' and long_press_has_scene }}"
        sequence:
          - action: scene.turn_on
            target: !input long_press_target

      # Long press + on/off/toggle (geen scene).
      - conditions:
          - condition: trigger
            id: long_press
          - condition: template
            value_template: "{{ long_press_action == 'on' and not long_press_has_scene }}"
        sequence:
          - action: homeassistant.turn_on
            target: !input long_press_target

      - conditions:
          - condition: trigger
            id: long_press
          - condition: template
            value_template: "{{ long_press_action == 'off' and not long_press_has_scene }}"
        sequence:
          - action: homeassistant.turn_off
            target: !input long_press_target

      - conditions:
          - condition: trigger
            id: long_press
          - condition: template
            value_template: "{{ long_press_action == 'toggle' and not long_press_has_scene }}"
        sequence:
          - action: homeassistant.toggle
            target: !input long_press_target
