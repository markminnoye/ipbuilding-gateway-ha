# ipbuilding_blueprint_version: 2
blueprint:
  name: IPBuilding wandknop — dimmen
  description: >
    Hue-style continuous dimming for an IPBuilding IP1100PoE wall switch.
    Use this for a wall button that should:
      - toggle the target light on a short press;
      - dim the target light while held (direction flips on release and
        on hitting 1 % / 100 %).

    The companion exposes `press`, `long_press`, and `release` events on
    the event entity of each physical button — this blueprint hooks into
    those via state triggers, so it does not need any extra helper wiring
    beyond a single `input_boolean` direction tracker.

    A separate `button_cover` blueprint handles the hold-to-move / release-to-stop
    pattern for curtains and screens. A separate `button_standard` blueprint
    handles plain on/off/toggle/scene mappings for short and long press.
  domain: automation
  source_url: https://github.com/markminnoye/ipbuilding-gateway-ha/blob/main/custom_components/ipbuilding_gateway_ha/blueprints/automation/ipbuilding_gateway_ha/button_dim.yaml

  input:
    automation_name:
      name: Naam automatisering
      description: >
        Gebruik de weergavenaam van de knop (zichtbaar in de entity-kiezer),
        bv. "Keuken wandknop → Keuken LED". De entity_id `event.<hardware_id>`
        is bewust niet leesbaar en hoort niet in de alias.
      default: ""
      selector:
        text:

    button_entity:
      name: Knop
      description: >
        De IPBuilding event-entity van de fysieke wandknop
        (bv. `event.2f8185190000df`). De entity moet ingeschakeld zijn
        in Instellingen → Apparaten & entiteiten.
      selector:
        entity:
          filter:
            - domain: event
              integration: ipbuilding_gateway_ha

    automation_area:
      name: Ruimte
      description: >
        Ruimte voor de automatisering. De companion zet de `room` uit
        devices.json als `suggested_area` op het knop-device; kies hier
        dezelfde ruimte zodat de automatisering in de Lovelace-ruimte
        verschijnt.
      default: ""
      selector:
        area:

    target_light:
      name: Lamp
      description: De lamp (of lampengroep) om te dimmen.
      selector:
        entity:
          domain: light
          multiple: false

    direction_helper:
      name: Dim-richting helper
      description: >
        `input_boolean` helper die de huidige dim-richting bijhoudt.
        AAN = volgende hold dimt omhoog, UIT = omlaag. De blueprint
        flipt deze bij elke release en bij het bereiken van 1 % / 100 %.

        Aanmaken: Instellingen → Apparaten & services → Helpers → Toggle.
        Vul bij **Naam** een leesbaar label in (mag spaties bevatten),
        bv. "Keuken knop 1 — dim omhoog". Stel de **Entity ID** apart in
        op alleen kleine letters, cijfers en underscores, bv.
        `ipb_keuken_knop_1_dim_up`. Spaties in de entity_id veroorzaken
        een fout bij het opslaan.
      selector:
        entity:
          domain: input_boolean

    dim_step_pct:
      name: Dim-stap %
      description: Helderheidsverandering per loop-iteratie.
      default: 5
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
          mode: slider

    dim_interval_ms:
      name: Dim-interval (ms)
      description: Pauze tussen dim-stappen. Kleiner = sneller dimmen, meer verkeer.
      default: 200
      selector:
        number:
          min: 50
          max: 2000
          unit_of_measurement: "ms"
          mode: slider

    dim_boundary_pct:
      name: Dim-grens %
      description: >
        Initiële richting als de helper-state nog niet beschikbaar is
        (< dit % → omhoog, ≥ dit % → omlaag). Ook gebruikt als zachte
        hint bij opstart.
      default: 50
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
          mode: slider

mode: restart

alias: !input automation_name
area_id: !input automation_area

trigger:
  - platform: state
    entity_id: !input button_entity
    to: "press"
    id: press
  - platform: state
    entity_id: !input button_entity
    to: "long_press"
    id: hold
  - platform: state
    entity_id: !input button_entity
    to: "release"
    id: release
  # Auto-flip on hitting either brightness endpoint.
  - platform: numeric_state
    entity_id: !input target_light
    attribute: brightness
    above: 254
    id: hit_top
    for:
      seconds: 1
  - platform: numeric_state
    entity_id: !input target_light
    attribute: brightness
    below: 3
    id: hit_bottom
    for:
      seconds: 1

action:
  - choose:
      # Short press → toggle the light.
      - conditions:
          - condition: trigger
            id: press
        sequence:
          - action: light.toggle
            target:
              entity_id: !input target_light

      # Hold → repeat the dim loop while the trigger id is "hold".
      - conditions:
          - condition: trigger
            id: hold
        sequence:
          - variables:
              step: !input dim_step_pct
              interval_ms: !input dim_interval_ms
              direction_helper: !input direction_helper
              sign: "{{ 1 if is_state(direction_helper, 'on') else -1 }}"
          - repeat:
              while:
                - condition: trigger
                  id: hold
              sequence:
                - action: light.turn_on
                  target:
                    entity_id: !input target_light
                  data:
                    brightness_step_pct: "{{ step * sign }}"
                    transition: 0.2
                - delay:
                    milliseconds: !input dim_interval_ms

      # Release → flip the direction helper for the next hold.
      - conditions:
          - condition: trigger
            id: release
        sequence:
          - action: input_boolean.toggle
            target:
              entity_id: !input direction_helper

      # Endpoint hit → flip the direction helper.
      - conditions:
          - condition: trigger
            id:
              - hit_top
              - hit_bottom
        sequence:
          - action: input_boolean.toggle
            target:
              entity_id: !input direction_helper
